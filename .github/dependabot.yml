version: 2

updates:
  - package-ecosystem: npm
    directory: /
    target-branch: dev
    schedule:
      interval: daily

    groups:
      patch-dependencies:
        patterns:
          - "*"
        update-types:
          - patch

      minor-dependencies:
        patterns:
          - "*"
        update-types:
          - minor

    ignore:
      - dependency-name: "*"
        update-types:
          - major
